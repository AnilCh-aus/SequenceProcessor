name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SequenceProcessor.sln

      - name: Verify formatting
        run: dotnet format SequenceProcessor.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build SequenceProcessor.sln --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test SequenceProcessor.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Install report generator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator             -reports:"TestResults/**/coverage.cobertura.xml"             -targetdir:"coveragereport"             -reporttypes:"HtmlInline;MarkdownSummaryGithub"

      - name: Publish coverage summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport
